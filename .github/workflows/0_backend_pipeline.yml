name: "0_Backend_Pipeline"
run-name: Backend_Pipeline_-_${{ inputs.branch || 'main' }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'wonderWhy branch to build/test/deploy'
        required: true
        type: string
        default: main

jobs:
  find_latest_version:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.get_version.outputs.latest_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch }}
          fetch-depth: 1
          sparse-checkout: '.gitignore'
          sparse-checkout-cone-mode: false
      - id: get_version
        run: |
          latest_version=$(git log -1 --format=%H)
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.branch }} to $latest_version"

  lint:
    needs: find_latest_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: |
          yarn install
          yarn b format
          yarn b lint
          yarn b build
          yarn b checkVersion
      # Separate step, not folded into `yarn b lint`: that lint sits exactly on its
      # --max-warnings budget, so a new rule there would fail the budget instead of
      # reporting N+1s. This carries its own budget, which grandfathers the N+1s already
      # in the tree and fails only on a new one. Runs after build so a red build reports
      # first; ~30s.
      - name: N+1 lint
        working-directory: wonderWhy
        run: yarn b lint:n-plus-one
      # Same shape as the N+1 step, and separate for the same reason: its own --max-warnings
      # budget grandfathers the endpoints that already take an id list in the URL and fails only
      # when a new one is added.
      - name: ID-list-in-URL lint
        working-directory: wonderWhy
        run: yarn b lint:id-list-query
      # Same shape again: its own --max-warnings budget grandfathers the raw queries already in the
      # tree that lack a tenantId predicate and fails only when a new un-tenanted raw query is added.
      # Raw SQL bypasses the tenant-filter Prisma extension, which is how the tyre report leaked
      # across tenants.
      - name: Tenant-scope (raw query) lint
        working-directory: wonderWhy
        run: yarn b lint:tenant-scope

  unit_test:
    needs: find_latest_version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # subContracts (split 4 ways by subfolder for runtime, coverage scoped per folder)
          - name: subContracts-controller
            cmd: 'yarn b test --coverage.include="src/subContracts/controller/**" src/subContracts/controller'
          - name: subContracts-models
            cmd: 'yarn b test --coverage.include="src/subContracts/models/**" src/subContracts/models'
          - name: subContracts-domain
            cmd: 'yarn b test --coverage.include="src/subContracts/domain/**" src/subContracts/domain'
          - name: subContracts-rest
            cmd: 'yarn b test --coverage.include="src/subContracts/axiosServices/**" --coverage.include="src/subContracts/sqsListners/**" src/subContracts/axiosServices src/subContracts/sqsListners'
          # accounts (split 2 ways)
          - name: accounts-controller
            cmd: 'yarn b test --coverage.include="src/accounts/controller/**" src/accounts/controller'
          - name: accounts-rest
            cmd: 'yarn b test --coverage.include="src/accounts/models/**" --coverage.include="src/accounts/domain/**" --coverage.include="src/accounts/axiosServices/**" --coverage.include="src/accounts/axiosService/**" src/accounts/models src/accounts/domain src/accounts/axiosServices src/accounts/axiosService'
          # other modules (unchanged)
          - name: bankStatements
            cmd: 'yarn b test --coverage.include="src/bankStatements/**" src/bankStatements'
          - name: commonFunctions
            cmd: 'yarn b test --coverage.include="src/commonFunctions/**" src/commonFunctions'
          - name: dataProvider
            cmd: 'yarn b test --coverage.include="src/dataProvider/**" src/dataProvider'
          - name: driverSalary
            cmd: 'yarn b test --coverage.include="src/driverSalary/**" src/driverSalary'
          - name: eInvoice
            cmd: 'yarn b test --coverage.include="src/eInvoice/**" src/eInvoice'
          - name: gstService
            cmd: 'yarn b test --coverage.include="src/gstService/**" src/gstService'
          - name: icici
            cmd: 'yarn b test --coverage.include="src/icici/**" src/icici'
          - name: kratos
            cmd: 'yarn b test --coverage.include="src/kratos/**" src/kratos'
          - name: logger
            cmd: 'yarn b test --coverage.include="src/logger/**" src/logger'
          - name: make
            cmd: 'yarn b test --coverage.include="src/make/**" src/make'
          - name: middleware
            cmd: 'yarn b test --coverage.include="src/middleware/**" src/middleware'
          - name: ocr
            cmd: 'yarn b test --coverage.include="src/ocr/**" src/ocr'
          - name: tenants
            cmd: 'yarn b test --coverage.include="src/tenants/**" src/tenants'
          - name: tyre
            cmd: 'yarn b test --coverage.include="src/tyre/**" src/tyre'
          - name: vehicleService
            cmd: 'yarn b test --coverage.include="src/vehicleService/**" src/vehicleService'
          - name: whatsapp
            cmd: 'yarn b test --coverage.include="src/whatsapp/**" src/whatsapp'
          - name: root
            cmd: 'yarn b test --coverage.include="src/*.ts" --project=root'
    name: Unit Tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: yarn install
      - working-directory: wonderWhy
        run: ${{ matrix.cmd }}

  functional_test:
    needs: find_latest_version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout wonderWhy
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
          fetch-depth: 1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - name: Pull functional-test image
        run: docker pull ghcr.io/wonderwhydev/functional-test:latest

      - name: Bring up localstack and create SQS queue
        working-directory: wonderWhy
        run: |
          docker compose -p ci up -d --wait localstack
          docker compose -p ci exec -T localstack awslocal sqs create-queue --queue-name margin
          docker compose -p ci exec -T localstack awslocal sqs create-queue \
            --queue-name gl_posting_dlq.fifo --attributes FifoQueue=true
          docker compose -p ci exec -T localstack awslocal sqs create-queue \
            --queue-name gl_posting.fifo \
            --attributes FifoQueue=true,DeduplicationScope=messageGroup,FifoThroughputLimit=perMessageGroupId

      - name: Bring up backend, kratos, functional-test
        working-directory: wonderWhy
        run: |
          docker compose -p ci up -d backend kratos
          docker compose -p ci up -d functional-test

      - name: Wait for backend
        working-directory: wonderWhy
        run: |
          for i in $(seq 1 60); do
            code=$(docker compose -p ci exec -T functional-test \
              curl -s -o /dev/null -w "%{http_code}" http://backend:3000/api/transporter || echo 000)
            case "$code" in
              200|401) echo "Backend ready (HTTP $code)"; exit 0 ;;
            esac
            echo "Try $i: HTTP $code"
            sleep 10
          done
          echo "Backend did not become ready" >&2
          exit 1

      - name: Run API tests
        working-directory: wonderWhy
        run: |
          docker compose -p ci exec -T functional-test sh -c \
            "cd /app/functional-test && dart pub get && dart test --concurrency=1 test/api/"

      - name: Diagnostics on failure
        if: failure()
        working-directory: wonderWhy
        run: |
          echo "::group::docker compose ps -a"
          docker compose -p ci ps -a
          echo "::endgroup::"

          for svc in backend kratos db localstack functional-test; do
            echo "::group::docker inspect $svc (state)"
            docker compose -p ci ps -a --format '{{.Service}}\t{{.State}}\t{{.Status}}' | grep -E "^$svc[[:space:]]" || true
            cid=$(docker compose -p ci ps -aq "$svc" 2>/dev/null | head -1)
            if [ -n "$cid" ]; then
              docker inspect --format 'ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Error={{.State.Error}} Started={{.State.StartedAt}} Finished={{.State.FinishedAt}}' "$cid"
            fi
            echo "::endgroup::"
            echo "::group::logs: $svc (last 200)"
            docker compose -p ci logs --tail=200 --no-color "$svc" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Tear down
        if: always()
        working-directory: wonderWhy
        run: docker compose -p ci down -v

  # Hard gate before QA (and therefore prod): the full driver-advance journey (real
  # UI, real backend, offline OCR/HDFC mocks) on the exact commit being deployed.
  # Hangs off lint so it runs in parallel with the unit and functional tests; a red
  # journey blocks deploy_qa. Complements functional_test (test/api/) — this one is
  # test/mock/ plus the Patrol UI flow.
  e2e_journey:
    needs: [find_latest_version, lint]
    uses: ./.github/workflows/web_e2e_journey.yml
    with:
      ref: ${{ needs.find_latest_version.outputs.latest_version }}
    secrets:
      REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
      GHRC_SECRET_KEY: ${{ secrets.GHRC_SECRET_KEY }}

  deploy_qa:
    runs-on: ubuntu-latest
    needs: [find_latest_version, lint, unit_test, functional_test, e2e_journey]
    outputs:
      latest_version: ${{ needs.find_latest_version.outputs.latest_version }}
    environment:
      name: qa
    steps:
      - name: Check out pipelines repo for actions
        uses: actions/checkout@v5

      - name: Check out wonderWhy
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: 'wonderWhy/yarn.lock'

      - working-directory: wonderWhy
        run: |
          yarn install --force
          yarn b build

      - uses: ./.github/actions/upload_version_file
        with:
          version: ${{ needs.find_latest_version.outputs.latest_version }}
          env: qa

      - name: Stage backend payload
        run: |
          sed -i 's|name: wonderwhy_postgres-network|name: wonderwhy-network|' wonderWhy/backend/deploy/compose.yml
          mkdir backend
          cp -r wonderWhy/backend/prisma backend/
          cp -rf wonderWhy/backend/assets backend/
          cp -rf wonderWhy/backend/prisma/migrations backend/prisma/schema/
          cp wonderWhy/backend/dist/app.js backend/
          cp -rf wonderWhy/backend/externalPackages backend/
          cp wonderWhy/backend/package.json backend/
          cp wonderWhy/backend/prisma.config.ts backend/
          cp wonderWhy/backend/deploy/* backend/

      - name: Decode ICICI .p12 and zip backend
        run: |
          echo "${{ secrets.ICICI_KEYSTORE_BASE64 }}" | base64 --decode \
            > backend/externalPackages/icici/node-composite-sv-build/composite_node_sdk_uat/config/iciciKey.p12
          zip -r backend.zip backend

      - uses: ./.github/actions/copy_to_ec2
        with:
          ec2IP: ${{ secrets.EC2_IP }}
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY }}
          awsSecretKey: ${{ secrets.AWS_SECRET_KEY }}
          awsRegion: ${{ secrets.AWS_REGION }}
          ec2User: ${{ secrets.EC2_USER }}
          securityGroupId: ${{ secrets.SECURITY_GROUP_ID }}
          sshKey: ${{ secrets.SSH_PRIVATE_KEY_FOR_EC2 }}
          fileToCopy: ./backend.zip
          destination: ~/backend.zip
          runScript: |
            set -e
            if grep -q "include /usr/share/nginx/conf/upstream-backend.conf" ~/nginx/nginx.conf 2>/dev/null; then
              ACTIVE=$(grep -E "^[[:space:]]*server backend_(blue|green):8000" ~/nginx/conf/upstream-backend.conf 2>/dev/null | grep -v "down;" | grep -oE "backend_(blue|green)" | head -1 | sed "s/backend_//")
            else
              ACTIVE=$(grep -E "^[[:space:]]*server backend_(blue|green):8000" ~/nginx/nginx.conf 2>/dev/null | grep -v "down;" | grep -oE "backend_(blue|green)" | head -1 | sed "s/backend_//")
            fi
            [ -n "$ACTIVE" ] || ACTIVE=blue
            case "$ACTIVE" in
              blue)  INACTIVE=green ;;
              green) INACTIVE=blue ;;
            esac
            echo "active=$ACTIVE; deploying to $INACTIVE"
            mkdir -p ~/wonderwhy_backend
            rm -rf /tmp/backend_unzip
            mkdir -p /tmp/backend_unzip
            unzip -o ~/backend.zip -d /tmp/backend_unzip
            sudo rm -rf ~/wonderwhy_backend/$INACTIVE
            mkdir -p ~/wonderwhy_backend/$INACTIVE
            cp -rf /tmp/backend_unzip/backend/. ~/wonderwhy_backend/$INACTIVE/
            rm -rf /tmp/backend_unzip
            cp ~/wonderwhy_backend/$INACTIVE/compose.yml ~/wonderwhy_backend/compose.yml
            cp ~/wonderwhy_backend/$INACTIVE/flip.sh    ~/wonderwhy_backend/flip.sh
            cp ~/wonderwhy_backend/$INACTIVE/deploy.sh  ~/wonderwhy_backend/deploy.sh
            chmod +x ~/wonderwhy_backend/flip.sh ~/wonderwhy_backend/deploy.sh
            sudo chown -R ec2-user:ec2-user ~/wonderwhy_backend
            cd ~/wonderwhy_backend
            # deploy.sh takes these POSITIONALLY, so a dead arg must stay as ""
            # rather than be deleted - dropping a line shifts every later arg
            # (deploy.sh reads ${15} and ${16}, so ENV_TYPE would silently empty).
            # Every arg is quoted for the same reason: an unquoted empty secret
            # collapses to zero tokens and shifts the rest.
            # 1,2,14 are "" because nothing reads them: CLIENT_ID/ZITADEL_PAT are
            # Zitadel-era (auth is Kratos now) and COMPOSITE_API_KEY is set at
            # runtime from Secrets Manager (see setApiKeyForPayment.ts).
            sh ./deploy.sh "" \
              "" \
              "auth.${{ secrets.DOMAIN_NAME }}.${{ secrets.BASE_DOMAIN }}" \
              "${{ secrets.GEN_AI_GOOGLE_API }}" \
              "${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
              "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
              "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" \
              "${{ secrets.WHATSAPP_FUEL_FLOW_ID }}" \
              "${{ secrets.WHATSAPP_SHORTAGE_FLOW_ID }}" \
              "${{ secrets.WHATSAPP_LR_FLOW_ID }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_PATH }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_PASSWORD }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_ALIAS }}" \
              "" \
              "${{ secrets.COMPOSITE_PRIVATE_PEM_PATH }}" \
              "${{ secrets.ENV_TYPE }}"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: [find_latest_version, deploy_qa]
    environment: magnum
    steps:
      - name: Check out pipelines repo for actions
        uses: actions/checkout@v5

      - name: Check out wonderWhy
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: 'wonderWhy/yarn.lock'

      - working-directory: wonderWhy
        run: |
          yarn install --force
          yarn b build

      - uses: ./.github/actions/upload_version_file
        with:
          version: ${{ needs.find_latest_version.outputs.latest_version }}
          env: prod

      - name: Stage backend payload
        run: |
          mkdir backend
          cp -r wonderWhy/backend/prisma backend/
          cp -rf wonderWhy/backend/assets backend/
          cp -rf wonderWhy/backend/prisma/migrations backend/prisma/schema/
          cp wonderWhy/backend/dist/app.js backend/
          cp -rf wonderWhy/backend/externalPackages backend/
          cp wonderWhy/backend/package.json backend/
          cp wonderWhy/backend/prisma.config.ts backend/
          cp wonderWhy/backend/deploy/* backend/

      - name: Decode ICICI .p12 and zip backend
        run: |
          echo "${{ secrets.ICICI_KEYSTORE_BASE64 }}" | base64 --decode \
            > backend/externalPackages/icici/node-composite-sv-build/composite_node_sdk_uat/config/iciciKey.p12
          zip -r backend.zip backend

      - uses: ./.github/actions/copy_to_ec2
        with:
          ec2IP: ${{ secrets.EC2_IP }}
          awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY }}
          awsSecretKey: ${{ secrets.AWS_SECRET_KEY }}
          awsRegion: ${{ secrets.AWS_REGION }}
          ec2User: ${{ secrets.EC2_USER }}
          securityGroupId: ${{ secrets.SECURITY_GROUP_ID }}
          sshKey: ${{ secrets.SSH_PRIVATE_KEY_FOR_EC2 }}
          fileToCopy: ./backend.zip
          destination: ~/backend.zip
          runScript: |
            set -e
            if grep -q "include /usr/share/nginx/conf/upstream-backend.conf" ~/nginx/nginx.conf 2>/dev/null; then
              ACTIVE=$(grep -E "^[[:space:]]*server backend_(blue|green):8000" ~/nginx/conf/upstream-backend.conf 2>/dev/null | grep -v "down;" | grep -oE "backend_(blue|green)" | head -1 | sed "s/backend_//")
            else
              ACTIVE=$(grep -E "^[[:space:]]*server backend_(blue|green):8000" ~/nginx/nginx.conf 2>/dev/null | grep -v "down;" | grep -oE "backend_(blue|green)" | head -1 | sed "s/backend_//")
            fi
            [ -n "$ACTIVE" ] || ACTIVE=blue
            case "$ACTIVE" in
              blue)  INACTIVE=green ;;
              green) INACTIVE=blue ;;
            esac
            echo "active=$ACTIVE; deploying to $INACTIVE"
            mkdir -p ~/wonderwhy_backend
            rm -rf /tmp/backend_unzip
            mkdir -p /tmp/backend_unzip
            unzip -o ~/backend.zip -d /tmp/backend_unzip
            sudo rm -rf ~/wonderwhy_backend/$INACTIVE
            mkdir -p ~/wonderwhy_backend/$INACTIVE
            cp -rf /tmp/backend_unzip/backend/. ~/wonderwhy_backend/$INACTIVE/
            rm -rf /tmp/backend_unzip
            cp ~/wonderwhy_backend/$INACTIVE/compose.yml ~/wonderwhy_backend/compose.yml
            cp ~/wonderwhy_backend/$INACTIVE/flip.sh    ~/wonderwhy_backend/flip.sh
            cp ~/wonderwhy_backend/$INACTIVE/deploy.sh  ~/wonderwhy_backend/deploy.sh
            chmod +x ~/wonderwhy_backend/flip.sh ~/wonderwhy_backend/deploy.sh
            sudo chown -R ec2-user:ec2-user ~/wonderwhy_backend
            cd ~/wonderwhy_backend
            # positional args: see the note on the QA deploy above. Dead args stay
            # as "" so later positions do not shift; all args quoted so an empty
            # secret cannot collapse and shift them either.
            sh ./deploy.sh "" \
              "" \
              "auth.${{ secrets.DOMAIN_NAME }}.${{ secrets.BASE_DOMAIN }}" \
              "${{ secrets.GEN_AI_GOOGLE_API }}" \
              "${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
              "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
              "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" \
              "${{ secrets.WHATSAPP_FUEL_FLOW_ID }}" \
              "${{ secrets.WHATSAPP_SHORTAGE_FLOW_ID }}" \
              "${{ secrets.WHATSAPP_LR_FLOW_ID }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_PATH }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_PASSWORD }}" \
              "${{ secrets.COMPOSITE_KEYSTORE_ALIAS }}" \
              "" \
              "${{ secrets.COMPOSITE_PRIVATE_PEM_PATH }}" \
              "${{ secrets.ENV_TYPE }}"
