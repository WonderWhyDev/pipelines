name: "0_Deploy_Mobile"
run-name: Deploy_Mobile_-_${{ inputs.branch || 'main' }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'wonderWhy branch to build/test/deploy'
        required: true
        type: string
        default: main

jobs:
  find_latest_version:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.get_version.outputs.latest_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 1
          sparse-checkout: '.gitignore'
          sparse-checkout-cone-mode: false
      - id: get_version
        run: |
          latest_version=$(git log -1 --format=%H)
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.branch || 'main' }} to $latest_version"

  lint:
    needs: find_latest_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Bootstrap melos workspace
        run: |
          cd flutter
          dart pub get
          dart run melos bootstrap

      - name: Check formatting
        run: |
          cd flutter/apps/wondermove_mobile
          dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: |
          cd flutter/apps/wondermove_mobile
          flutter analyze

      - name: Check test mocking (HTTP-level only, no state-level mocks)
        run: |
          cd flutter/packages/test_lints && dart pub get
          dart run bin/check.dart ../../apps/wondermove_mobile/test

  unit_test:
    needs: find_latest_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Bootstrap melos workspace
        run: |
          cd flutter
          dart pub get
          dart run melos bootstrap

      - name: Run tests
        run: |
          cd flutter/apps/wondermove_mobile
          flutter test

  # Android E2E — the driver and operations journeys, on a real emulator,
  # against OFFLINE mocks. Runs after lint, alongside unit_test, and gates both
  # beta deploys.
  #
  # Topology: the backend stack runs in docker with nginx published on :80. The
  # emulator runs on the same runner and reaches it through
  # `adb reverse tcp:8080 tcp:80`, which opens a listener on the EMULATOR's
  # loopback and forwards to the runner's nginx. So the app talks to
  # http://localhost:8080 -> nginx -> backend/kratos — the same request path
  # prod uses, and the same one the web journey exercises.
  #   - 8080 on the device, not 80: adb reverse opens that socket with adbd's
  #     own privileges, and a privileged port would need root.
  #   - localhost, not 10.0.2.2: 10.0.2.2 reaches the host too, but through the
  #     emulator's NAT alias, which no real build ever uses.
  #
  # Two app-side prerequisites ship with this in the monorepo:
  #   - environment_config.dart has an ENV=e2e case pointing at
  #     http://localhost:8080 (ENV=local targets :3000/:4433 directly, which are
  #     NOT published, and mean "the emulator itself" anyway).
  #   - the DEBUG AndroidManifest allows cleartext, since API 28+ blocks plain
  #     http and the whole harness is http. Release is untouched.
  #
  # External providers (OCR, SurePass) are mocked by compose.mock.yml exactly as
  # in the web journey — the backend calls them server-side, so the emulator
  # needs no knowledge of them.
  android_e2e:
    needs: [find_latest_version, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_FILES: "-f compose.yml -f compose.local.yml -f compose.mock.yml"
      PROJECT: androide2e
      # compose.local.yml publishes nginx on ${WEB_PORT} and requires it to be set,
      # so that a developer box cannot silently grab the shared host port. A CI
      # runner is single-tenant, so 80 is both free and what the app expects.
      WEB_PORT: 80
      FLUTTER_ROOT_DIR: flutter
    steps:
      - name: Checkout wonderWhy (code + compose live here)
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
          fetch-depth: 1

      # functional-test image is private on GHCR; the rest are public.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      # The stack is started FIRST, before any Flutter/Gradle/AVD work, and is
      # deliberately not waited on here. The backend container runs
      # `yarn install && yarn b pris && yarn b dev` on boot (~2min); starting it
      # now means that happens while Flutter, melos, patrol_cli and the AVD
      # snapshot are being set up, instead of on the critical path. By the time
      # "Wait for backend" runs it is usually already serving.
      - name: Bring up offline-mock stack
        run: |
          # compose.yml bind-mounts ~/.pub-cache into three services. Docker
          # creates a missing bind-mount source as ROOT, and because this step
          # now runs before flutter-action (which used to create it first), that
          # left ~/.pub-cache unwritable by the runner: the next `dart pub get`
          # died with "Creation failed, path = '/home/runner/.pub-cache/
          # hosted-hashes' (OS Error: Permission denied)". Create it ourselves so
          # docker mounts an existing, runner-owned directory.
          mkdir -p ~/.pub-cache
          docker compose $COMPOSE_FILES -p $PROJECT up -d --wait db localstack mailpit
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name margin
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name gl_posting_dlq.fifo --attributes FifoQueue=true
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name gl_posting.fifo \
            --attributes FifoQueue=true,DeduplicationScope=messageGroup,FifoThroughputLimit=perMessageGroupId
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal s3 mb s3://localbucket
          docker compose $COMPOSE_FILES -p $PROJECT up -d --build \
            kratos backend mock-server nginx functional-test

      # ---- toolchain setup: runs while the backend above is still booting ----

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      # patrol_cli warns on anything but Java 17/21 for Android, and the app
      # already compiles at 17.
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # Holds both the downloaded dependencies and, since the app sets
      # org.gradle.caching=true, the task-output build cache under
      # caches/build-cache-1 — so an unchanged assembleDebug replays instead of
      # recompiling. NOTE: actions/cache skips its save step when the job fails,
      # so a run that never reaches a green finish leaves the cache cold for the
      # next one (that is why the first three E2E runs each paid ~4m41s for a
      # cold `./gradlew :app:dependencies`).
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-androide2e-${{ hashFiles('flutter/apps/wondermove_mobile/android/**/*.gradle*', 'flutter/apps/wondermove_mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-androide2e-

      # wondermove_mobile depends on the in-repo path packages (auth_core,
      # auth_flutter, api_client) via pubspec_overrides.yaml, so the melos
      # workspace has to be bootstrapped before it can resolve.
      - name: Bootstrap melos workspace
        run: |
          cd $FLUTTER_ROOT_DIR
          dart pub get
          dart run melos bootstrap

      - name: Activate Patrol CLI
        # Pinned to match the app's patrol package (4.6.1); the CLI validates the
        # package version against a table it ships. Bump both together.
        run: dart pub global activate patrol_cli 4.4.0

      # The emulator needs KVM, which is present on ubuntu-latest but not
      # world-accessible by default.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cold-booting the AVD costs ~1m36s every run. Cache the created AVD plus
      # its saved snapshot so later runs resume from it in a few seconds. The key
      # pins every property that changes the image, so bumping api-level/target/
      # arch/profile below rebuilds it rather than restoring a mismatched device.
      - name: Cache AVD snapshot
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64-pixel_5

      # Only on a cache miss: boot once to generate the snapshot, saving nothing
      # else. Note this deliberately omits -no-snapshot (which would disable
      # snapshotting entirely) so the emulator writes one out on exit.
      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -timezone UTC
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # ---- back to the stack, which has been warming this whole time ----

      # bin/ is gitignored in the monorepo (so bin/wait-for-backend.sh is absent
      # on CI and the volume mount hides any baked-in copy). Inline the same poll.
      - name: Wait for backend
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test sh -c '
            URL="http://backend:3000/api/transporter"
            echo "Waiting for backend at $URL ..."
            for i in $(seq 1 90); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
              case "$code" in 200|401) echo "Backend ready (HTTP $code)"; exit 0;; esac
              echo "Try $i: backend not ready (HTTP $code)"; sleep 5
            done
            echo "Backend did not become ready in time"; exit 1
          '

      # Same pattern as the web journey's seed step: the Dart VM does not exit
      # after the seed commits (a lingering client keeps the loop alive), so
      # stream it, proceed the instant the marker appears, then kill the
      # leftover. The marker — not the exit code — is the step's verdict.
      - name: Seed driver + operations base data
        run: |
          set +e
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart pub get && dart run tool/seed_mobile.dart" \
            > /tmp/seed.log 2>&1 &
          EXEC_PID=$!
          for i in $(seq 1 120); do
            grep -q "seed-mobile] done" /tmp/seed.log && break
            kill -0 "$EXEC_PID" 2>/dev/null || break
            sleep 2
          done
          cat /tmp/seed.log
          kill "$EXEC_PID" 2>/dev/null
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "pkill -f seed_mobile || true" >/dev/null 2>&1
          grep -q "seed-mobile] done" /tmp/seed.log

      # Both targets run in one emulator boot (boot is the expensive part).
      # clearPackageData=true + the orchestrator wipe the app between them, so
      # each starts logged out.
      - name: Run Patrol journeys on the emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          # Reuse the cached AVD and resume from its snapshot instead of cold
          # booting; -no-snapshot-save keeps this run from rewriting it (and so
          # from persisting whatever the tests leave behind).
          force-avd-creation: false
          disable-animations: true
          # -timezone UTC is load-bearing, not hygiene. The operations dashboard
          # derives its default "yesterday" range from the DEVICE's local date,
          # while seed_mobile.dart dates the trip from the container's (UTC)
          # date. If the two disagree on what "yesterday" is, the range misses
          # the seeded trip by a whole day and the ops test fails on an empty
          # panel. Runners are UTC today, so this only pins what is already true.
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio -no-boot-anim -timezone UTC
          working-directory: flutter/apps/wondermove_mobile
          # KEEP THE PATROL COMMAND ON ONE LINE. This action runs `script:` one
          # line per `sh -c`, so a backslash line-continuation does NOT continue:
          # the first line runs alone and every following flag is silently
          # dropped. That is not cosmetic. `patrol test` with no flags still
          # discovers both tests (via pubspec's test_directory) and runs them,
          # so it looks like a real run — but without --dart-define=ENV=e2e the
          # app falls back to ENV=test and logs in against the REAL
          # test1.wondermove.in, which fails as "credentials are invalid".
          #
          # startApp() also asserts ENV=e2e in-app, so if the defines are ever
          # lost again the suite fails immediately, naming the URL it was about
          # to talk to, instead of quietly hitting a live environment.
          script: |
            adb reverse tcp:8080 tcp:80
            adb shell 'curl -s -o /dev/null -w "nginx from emulator: %{http_code}\n" http://localhost:8080/api/transporter' || true
            PATROL_ANALYTICS_ENABLED=false patrol test --target patrol_test/journey/driver_test.dart --target patrol_test/journey/operations_test.dart --dart-define=ENV=e2e --verbose

      - name: Upload Patrol report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-report
          path: |
            flutter/apps/wondermove_mobile/build/app/reports
            flutter/apps/wondermove_mobile/build/app/outputs/androidTest-results
          if-no-files-found: ignore

      # --since 10m, not --tail: the emulator build+run takes ~10 minutes, so a
      # fixed tail is all seed-time noise and cuts off exactly the window the
      # tests ran in. Kratos logging NOTHING here is itself the signal that the
      # app never reached the local stack.
      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT logs --since 10m \
            backend mock-server nginx kratos || true

  beta_android:
    needs: [find_latest_version, lint, unit_test, android_e2e]
    uses: ./.github/workflows/x_deploy_base_mobile_android.yml
    with:
      versionToBuild: ${{ needs.find_latest_version.outputs.latest_version }}
      environment: magnum
      release_track: beta
    secrets:
      REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      GCP_JSON_KEY: ${{ secrets.GCP_JSON_KEY }}

  # android_e2e gates the iOS beta too: the journeys exercise the shared Dart
  # business logic (dashboards, routing, API layer), not the Android shell, so a
  # failure there means the iOS build is broken in the same way.
  beta_ios:
    needs: [find_latest_version, lint, unit_test, android_e2e]
    uses: ./.github/workflows/x_deploy_base_mobile_ios.yml
    with:
      versionToBuild: ${{ needs.find_latest_version.outputs.latest_version }}
      environment: magnum
      release_track: beta
    secrets:
      REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

  promote_android:
    needs: [find_latest_version, beta_android]
    uses: ./.github/workflows/x_deploy_base_mobile_android.yml
    with:
      versionToBuild: ${{ needs.find_latest_version.outputs.latest_version }}
      environment: magnum
      release_track: promote_beta_to_production
    secrets:
      REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      GCP_JSON_KEY: ${{ secrets.GCP_JSON_KEY }}

  promote_ios:
    needs: [find_latest_version, beta_ios]
    uses: ./.github/workflows/x_deploy_base_mobile_ios.yml
    with:
      versionToBuild: ${{ needs.find_latest_version.outputs.latest_version }}
      environment: magnum
      release_track: promote_beta_to_production
    secrets:
      REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
