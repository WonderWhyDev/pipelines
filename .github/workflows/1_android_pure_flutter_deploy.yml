name: "1_Android_Pure_Flutter_Deploy"
run-name: Android_Pure_Flutter_Deploy
on:
  workflow_dispatch:
    inputs:
      release_track:
        description: 'Release track'
        required: true
        type: choice
        options:
          - beta
          - production
          - promote_beta_to_production
        default: 'beta'
      app_env:
        description: 'App ENV baked into the build (--dart-define=ENV=...). Temporary: pick "test" to ship a beta pointing to test backend.'
        required: true
        type: choice
        options:
          - test
          - production
          - local
        default: 'test'

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: magnum

    env:
      APP_DIR: wonderWhy/flutter/apps/wondermove_mobile
      FLUTTER_ROOT_DIR: wonderWhy/flutter

    steps:
      - name: Check out wonderwhy folder
        uses: actions/checkout@v4
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Bootstrap melos workspace
        run: |
          cd $FLUTTER_ROOT_DIR
          dart pub get
          dart run melos bootstrap

      - name: Inject Fastlane
        run: |
          cd wonderWhy
          mkdir -p flutter/apps/wondermove_mobile/android/fastlane
          cp -r automation/androidFastlane/* flutter/apps/wondermove_mobile/android/fastlane/
          cp -r automation/Gemfile flutter/apps/wondermove_mobile/android/

      - name: Decode Keystore
        run: |
          cd wonderWhy
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > flutter/apps/wondermove_mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          cd wonderWhy
          cat <<EOF > flutter/apps/wondermove_mobile/android/key.properties
            storeFile=keystore.jks
            storePassword=${{ secrets.KEYSTORE_PASSWORD }}
            keyAlias=${{ secrets.KEY_ALIAS }}
            keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

      - name: Install Fastlane
        run: |
          cd $APP_DIR/android
          gem install bundler -v "~> 2.7"
          bundle install

      - name: Configure Gradle
        run: |
          cd $APP_DIR/android
          cat >> gradle.properties << 'EOF'

          org.gradle.jvmargs=-Xmx4096m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Build & Upload to Google Play
        env:
          GCP_JSON_KEY: ${{ secrets.GCP_JSON_KEY }}
          APP_ENV: ${{ github.event.inputs.app_env }}
        run: |
          cd $APP_DIR/android
          echo "Building app with APP_ENV=$APP_ENV on track=${{ github.event.inputs.release_track }}"
          bundle exec fastlane --version
          case "${{ github.event.inputs.release_track }}" in
            beta)
              bundle exec fastlane upload_to_open_testing
              ;;
            production)
              bundle exec fastlane upload_to_production
              ;;
            promote_beta_to_production)
              bundle exec fastlane promote_beta_to_production
              ;;
            *)
              echo "Unknown release_track: ${{ github.event.inputs.release_track }}"
              exit 1
              ;;
          esac
