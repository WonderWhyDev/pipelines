name: "2_Backend_Lint_Tests"
run-name: Backend_Lint_Tests_-_${{ inputs.branch || 'main' }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'wonderWhy branch to build/test'
        required: true
        type: string
        default: main
  schedule:
    - cron: "30 15 * * 1-6"

jobs:
  find_latest_version:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.get_version.outputs.latest_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 1
          sparse-checkout: '.gitignore'
          sparse-checkout-cone-mode: false
      - id: get_version
        run: |
          latest_version=$(git log -1 --format=%H)
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.branch || github.event_name == 'schedule' && 'main' || inputs.branch }} to $latest_version"

  Lint:
    needs: find_latest_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: |
          yarn install
          yarn b format
          yarn b lint
          yarn b build
          yarn b checkVersion

  Tests:
    needs: find_latest_version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # subContracts (split 4 ways by subfolder for runtime, coverage scoped per folder)
          - name: subContracts-controller
            cmd: 'yarn b test --coverage.include="src/subContracts/controller/**" src/subContracts/controller'
          - name: subContracts-models
            cmd: 'yarn b test --coverage.include="src/subContracts/models/**" src/subContracts/models'
          - name: subContracts-domain
            cmd: 'yarn b test --coverage.include="src/subContracts/domain/**" src/subContracts/domain'
          - name: subContracts-rest
            cmd: 'yarn b test --coverage.include="src/subContracts/axiosServices/**" --coverage.include="src/subContracts/sqsListners/**" src/subContracts/axiosServices src/subContracts/sqsListners'
          # accounts (split 2 ways)
          - name: accounts-controller
            cmd: 'yarn b test --coverage.include="src/accounts/controller/**" src/accounts/controller'
          - name: accounts-rest
            cmd: 'yarn b test --coverage.include="src/accounts/models/**" --coverage.include="src/accounts/domain/**" --coverage.include="src/accounts/axiosServices/**" --coverage.include="src/accounts/axiosService/**" src/accounts/models src/accounts/domain src/accounts/axiosServices src/accounts/axiosService'
          # other modules (unchanged)
          - name: bankStatements
            cmd: 'yarn b test --coverage.include="src/bankStatements/**" src/bankStatements'
          - name: commonFunctions
            cmd: 'yarn b test --coverage.include="src/commonFunctions/**" src/commonFunctions'
          - name: dataProvider
            cmd: 'yarn b test --coverage.include="src/dataProvider/**" src/dataProvider'
          - name: driverSalary
            cmd: 'yarn b test --coverage.include="src/driverSalary/**" src/driverSalary'
          - name: eInvoice
            cmd: 'yarn b test --coverage.include="src/eInvoice/**" src/eInvoice'
          - name: gstService
            cmd: 'yarn b test --coverage.include="src/gstService/**" src/gstService'
          - name: icici
            cmd: 'yarn b test --coverage.include="src/icici/**" src/icici'
          - name: kratos
            cmd: 'yarn b test --coverage.include="src/kratos/**" src/kratos'
          - name: logger
            cmd: 'yarn b test --coverage.include="src/logger/**" src/logger'
          - name: make
            cmd: 'yarn b test --coverage.include="src/make/**" src/make'
          - name: middleware
            cmd: 'yarn b test --coverage.include="src/middleware/**" src/middleware'
          - name: ocr
            cmd: 'yarn b test --coverage.include="src/ocr/**" src/ocr'
          - name: tenants
            cmd: 'yarn b test --coverage.include="src/tenants/**" src/tenants'
          - name: tyre
            cmd: 'yarn b test --coverage.include="src/tyre/**" src/tyre'
          - name: vehicleService
            cmd: 'yarn b test --coverage.include="src/vehicleService/**" src/vehicleService'
          - name: whatsapp
            cmd: 'yarn b test --coverage.include="src/whatsapp/**" src/whatsapp'
          - name: root
            cmd: 'yarn b test --coverage.include="src/*.ts" --project=root'
    name: Tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v5
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: yarn install
      - working-directory: wonderWhy
        run: ${{ matrix.cmd }}
