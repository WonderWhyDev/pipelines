name: "2_Functional_Test_API"
run-name: Functional_Test_API_-_${{ inputs.branch || 'main' }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'wonderWhy branch to test'
        required: true
        type: string
        default: main
  schedule:
    - cron: "0 4 * * *"

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout wonderWhy
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - name: Pull functional-test image
        run: docker pull ghcr.io/wonderwhydev/functional-test:latest

      - name: Bring up localstack and create SQS queue
        working-directory: wonderWhy
        run: |
          docker compose -p ci up -d --wait localstack
          docker compose -p ci exec -T localstack awslocal sqs create-queue --queue-name margin

      - name: Bring up backend, kratos, functional-test
        working-directory: wonderWhy
        run: |
          docker compose -p ci up -d backend kratos
          docker compose -p ci up -d functional-test

      - name: Wait for backend
        working-directory: wonderWhy
        run: |
          for i in $(seq 1 60); do
            code=$(docker compose -p ci exec -T functional-test \
              curl -s -o /dev/null -w "%{http_code}" http://backend:3000/api/transporter || echo 000)
            case "$code" in
              200|401) echo "Backend ready (HTTP $code)"; exit 0 ;;
            esac
            echo "Try $i: HTTP $code"
            sleep 10
          done
          echo "Backend did not become ready" >&2
          exit 1

      - name: Run API tests
        working-directory: wonderWhy
        run: |
          docker compose -p ci exec -T functional-test sh -c \
            "cd /app/functional-test && dart pub get && dart test test/api/"

      - name: Diagnostics on failure
        if: failure()
        working-directory: wonderWhy
        run: |
          echo "::group::docker compose ps -a"
          docker compose -p ci ps -a
          echo "::endgroup::"

          for svc in backend kratos db localstack functional-test; do
            echo "::group::docker inspect $svc (state)"
            docker compose -p ci ps -a --format '{{.Service}}\t{{.State}}\t{{.Status}}' | grep -E "^$svc[[:space:]]" || true
            cid=$(docker compose -p ci ps -aq "$svc" 2>/dev/null | head -1)
            if [ -n "$cid" ]; then
              docker inspect --format 'ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Error={{.State.Error}} Started={{.State.StartedAt}} Finished={{.State.FinishedAt}}' "$cid"
            fi
            echo "::endgroup::"
            echo "::group::logs: $svc (last 200)"
            docker compose -p ci logs --tail=200 --no-color "$svc" 2>&1 || true
            echo "::endgroup::"
          done

      - name: Tear down
        if: always()
        working-directory: wonderWhy
        run: docker compose -p ci down -v
