name: Backend Lint & Tests
run-name: Backend Lint & Tests - ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'wonderWhy branch to build/test'
        required: true
        type: string
        default: main

jobs:
  find_latest_version:
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.get_version.outputs.latest_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch }}
          fetch-depth: 1
          sparse-checkout: '.gitignore'
          sparse-checkout-cone-mode: false
      - id: get_version
        run: |
          latest_version=$(git log -1 --format=%H)
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT
          echo "Resolved ${{ inputs.branch }} to $latest_version"

  Lint:
    needs: find_latest_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v3
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: |
          yarn install
          yarn b format
          yarn b lint
          yarn b build
          yarn b checkVersion

  Tests:
    needs: find_latest_version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - accounts
          - bankStatements
          - commonFunctions
          - driverSalary
          - eInvoice
          - gstService
          - icici
          - kratos
          - logger
          - make
          - middleware
          - ocr
          - subContracts
          - tenants
          - tyre
          - vehicleService
          - whatsapp
          - root
    name: Tests (${{ matrix.module }})
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ needs.find_latest_version.outputs.latest_version }}
      - uses: actions/setup-node@v3
        with:
          node-version: '24.11.1'
          cache: 'yarn'
          cache-dependency-path: wonderWhy/yarn.lock
      - working-directory: wonderWhy
        run: yarn install
      - working-directory: wonderWhy
        env:
          MODULE: ${{ matrix.module }}
        run: |
          if [ "$MODULE" = "root" ]; then
            yarn b test --coverage.include="src/*.ts" src/*.test.ts
          else
            yarn b test --coverage.include="src/$MODULE/**" "src/$MODULE"
          fi
