name: Build Functional Test Image

on:
  workflow_dispatch:
    secrets:
      REPO_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wonderwhydev/functional-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout wonderWhy repo
        uses: actions/checkout@v4
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          sparse-checkout: functional-test/Dockerfile
          sparse-checkout-cone-mode: false

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: wonderWhy
          file: wonderWhy/functional-test/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/wonderwhydev/functional-test:latest
            ghcr.io/wonderwhydev/functional-test:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
