name: Build Test Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.test
          push: true
          tags: ghcr.io/wonderwhydev/test-image:latest
