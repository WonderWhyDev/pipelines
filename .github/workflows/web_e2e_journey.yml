# Driver-advance journey E2E against OFFLINE mocks.
#
# The whole journey (OCR + HDFC payout) runs without touching a real external
# provider: a single dummy mock-server container fakes both. See
# functional-test/mock_server in the wonderWhy repo.
#
# This workflow lives in the pipelines repo but all the code/compose lives in
# the wonderWhy monorepo, so it checks THAT out (like 0_web_pipeline.yml does).
#
# Two things run against one stack bring-up:
#   1. GATE (hard pass/fail): `dart test test/mock/` — the HDFC payout through
#      the real backend adapter -> mock -> CBX reference (mTLS + JOSE). This is
#      the proven offline-integration proof.
#   2. Patrol UI journey (non-blocking): login -> set HDFC secret via UI ->
#      OCR-upload via UI -> HDFC payout via UI. Steps 1-3 are proven; step 4
#      (payout UI) needs a seeded driver-advance payable that seed_journey.dart
#      does not create yet, so the Patrol step is continue-on-error. The payout
#      PATH it exercises is already gated green by step 1.

name: Web E2E Journey (offline mock)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "wonderWhy branch to test"
        required: false
        type: string
        default: main

jobs:
  journey:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_FILES: "-f compose.yml -f compose.local.yml -f compose.mock.yml"
      PROJECT: journey
    steps:
      - name: Checkout wonderWhy (code + compose live here)
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Activate Patrol CLI
        run: dart pub global activate patrol_cli

      # functional-test image is private on GHCR; the rest are public.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - name: Bring up offline-mock stack
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT up -d --wait db localstack mailpit
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name margin
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal s3 mb s3://localbucket
          docker compose $COMPOSE_FILES -p $PROJECT up -d --build \
            kratos backend mock-server nginx functional-test

      # bin/ is gitignored in the monorepo (so bin/wait-for-backend.sh is absent
      # on CI and the volume mount hides any baked-in copy). Inline the same poll.
      - name: Wait for backend
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test sh -c '
            URL="http://backend:3000/api/transporter"
            echo "Waiting for backend at $URL ..."
            for i in $(seq 1 90); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
              case "$code" in 200|401) echo "Backend ready (HTTP $code)"; exit 0;; esac
              echo "Try $i: backend not ready (HTTP $code)"; sleep 5
            done
            echo "Backend did not become ready in time"; exit 1
          '

      # seed_journey.dart finishes its work but the Dart VM does not always exit
      # (a lingering client keeps the event loop alive), so the process hangs.
      # Cap the run and gate on the completion marker rather than process exit.
      - name: Seed journey prerequisites
        run: |
          timeout 420 docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart pub get && dart run tool/seed_journey.dart" \
            | tee /tmp/seed.log || true
          grep -q "master data ready" /tmp/seed.log

      - name: GATE — offline HDFC mock system test
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart test test/mock/"

      - name: Install Playwright Chromium
        run: npx --yes playwright install --with-deps chromium

      # Non-blocking: step 4 (payout UI) awaits a seeded driver-advance payable.
      # Steps 1-3 (login, HDFC secret via UI, OCR upload via UI) are the unique
      # UI coverage here; the payout path itself is gated green above.
      - name: Patrol driver-advance journey (UI, non-blocking)
        continue-on-error: true
        working-directory: flutter/apps/wondermove_web
        run: |
          sed -i 's#<base href="/new/">#<base href="/">#' web/index.html
          flutter pub get
          export CHROME_EXECUTABLE="$(find "$HOME/.cache/ms-playwright" -name chrome -path '*chrome-linux*' | head -1)"
          PATROL_ANALYTICS_ENABLED=false patrol test -d chrome \
            --target patrol_test/journey/driver_advance_journey_test.dart \
            --web-port 3005 \
            --dart-define=ENV=local --dart-define=E2E=true \
            --web-headless true --web-server-timeout 600 \
            --web-browser-args '["--no-sandbox","--enable-unsafe-swiftshader"]'

      - name: Upload Patrol report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journey-playwright-report
          path: flutter/apps/wondermove_web/playwright-report
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT logs --tail 300 \
            backend mock-server nginx kratos || true
