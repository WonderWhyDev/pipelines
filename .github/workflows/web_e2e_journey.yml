# Driver-advance journey E2E against OFFLINE mocks.
#
# The whole journey (OCR + HDFC payout) runs without touching a real external
# provider: a single dummy mock-server container fakes both. See
# functional-test/mock_server in the wonderWhy repo.
#
# This workflow lives in the pipelines repo but all the code/compose lives in
# the wonderWhy monorepo, so it checks THAT out (like 0_web_pipeline.yml does).
#
# Two things run against one stack bring-up:
#   1. GATE (hard pass/fail): `dart test test/mock/` — the HDFC payout through
#      the real backend adapter -> mock -> CBX reference (mTLS + JOSE). This is
#      the proven offline-integration proof.
#   2. Patrol UI journey (blocking): login -> set HDFC secret via UI ->
#      OCR-upload via UI -> HDFC payout via UI. All four steps are seeded and
#      exercised end to end (seed_journey.dart now seeds the driver-advance
#      payable + beneficiary bank account for the payout step).

name: Web E2E Journey (offline mock)

# Callable as a gate from 0_backend_pipeline.yml / 0_web_pipeline.yml (which pass the
# resolved SHA so the journey validates the exact commit being promoted), and still
# runnable by hand (type a branch name).
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "wonderWhy branch or SHA to test"
        required: false
        type: string
        default: main
  workflow_call:
    inputs:
      ref:
        description: "wonderWhy branch or SHA to test"
        required: true
        type: string
    secrets:
      REPO_READ_TOKEN:
        required: true
      GHRC_SECRET_KEY:
        required: true

jobs:
  journey:
    runs-on: ubuntu-latest
    # Covers two Patrol suites off one bring-up: the driver-advance journey plus
    # the operations dashboard (its own seed, a ~1min build and a ~40s run).
    timeout-minutes: 60
    env:
      COMPOSE_FILES: "-f compose.yml -f compose.local.yml -f compose.mock.yml"
      PROJECT: journey
      # compose.local.yml publishes nginx on ${WEB_PORT} and requires it to be set,
      # so that a developer box cannot silently grab the shared host port. A CI
      # runner is single-tenant, so 80 is both free and what the app expects: the
      # Patrol app under --dart-define=E2E=true strips its own port to find nginx.
      WEB_PORT: 80
    steps:
      - name: Checkout wonderWhy (code + compose live here)
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Activate Patrol CLI
        # Pin to the CLI that matches the app's patrol package (4.6.1). The latest
        # published patrol_cli (4.5.0) added a strict check that rejects patrol
        # 4.6.1, and no 4.6.x CLI exists yet; 4.4.0 is the version that runs it.
        run: dart pub global activate patrol_cli 4.4.0

      # functional-test image is private on GHCR; the rest are public.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - name: Bring up offline-mock stack
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT up -d --wait db localstack mailpit
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name margin
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name gl_posting_dlq.fifo --attributes FifoQueue=true
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal sqs create-queue --queue-name gl_posting.fifo \
            --attributes FifoQueue=true,DeduplicationScope=messageGroup,FifoThroughputLimit=perMessageGroupId
          docker compose $COMPOSE_FILES -p $PROJECT exec -T localstack \
            awslocal s3 mb s3://localbucket
          docker compose $COMPOSE_FILES -p $PROJECT up -d --build \
            kratos backend mock-server nginx functional-test

      # bin/ is gitignored in the monorepo (so bin/wait-for-backend.sh is absent
      # on CI and the volume mount hides any baked-in copy). Inline the same poll.
      - name: Wait for backend
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test sh -c '
            URL="http://backend:3000/api/transporter"
            echo "Waiting for backend at $URL ..."
            for i in $(seq 1 90); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
              case "$code" in 200|401) echo "Backend ready (HTTP $code)"; exit 0;; esac
              echo "Try $i: backend not ready (HTTP $code)"; sleep 5
            done
            echo "Backend did not become ready in time"; exit 1
          '

      # seed_journey.dart commits all its work, prints the completion marker, then
      # hangs (the Dart VM doesn't exit — a lingering client keeps the loop alive).
      # Stream it, proceed the instant the marker appears, then kill the leftover
      # process. No fixed idle wait; the step's verdict is the marker.
      - name: Seed journey prerequisites
        run: |
          set +e
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart pub get && dart run tool/seed_journey.dart" \
            > /tmp/seed.log 2>&1 &
          EXEC_PID=$!
          for i in $(seq 1 120); do
            grep -q "seed-journey] done" /tmp/seed.log && break
            kill -0 "$EXEC_PID" 2>/dev/null || break
            sleep 2
          done
          cat /tmp/seed.log
          kill "$EXEC_PID" 2>/dev/null
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "pkill -f seed_journey || true" >/dev/null 2>&1
          grep -q "seed-journey] done" /tmp/seed.log

      - name: GATE — offline HDFC mock system test
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart test test/mock/"

      # Pin to the Playwright version patrol's web_runner bundles (patrol 4.6.1 ->
      # playwright 1.56.0). Installing the matching browser + system deps here makes
      # patrol's own `npx playwright install` a cached no-op instead of failing.
      - name: Install Playwright Chromium (match patrol web_runner)
        run: npx --yes playwright@1.56.0 install --with-deps chromium

      # Blocking: the full journey (login, HDFC secret via UI, OCR upload via UI,
      # HDFC payout via UI) is seeded and driven end to end. The payout step's
      # payable + beneficiary are seeded by seed_journey.dart.
      # --lang=en-US: headless chromium otherwise exposes an empty/malformed
      # navigator.languages, and Flutter's engine init throws "Incorrect locale
      # information provided" (parseBrowserLanguages) before any test can run.
      - name: Patrol driver-advance journey (UI)
        working-directory: flutter/apps/wondermove_web
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en_US:en
          LC_ALL: en_US.UTF-8
        run: |
          sed -i 's#<base href="/new/">#<base href="/">#' web/index.html
          flutter pub get
          export CHROME_EXECUTABLE="$(find "$HOME/.cache/ms-playwright" -name chrome -path '*chrome-linux*' | head -1)"
          PATROL_ANALYTICS_ENABLED=false patrol test -d chrome \
            --target patrol_test/journey/driver_advance_journey_test.dart \
            --web-port 3005 \
            --dart-define=ENV=local --dart-define=E2E=true \
            --web-headless true --web-server-timeout 600 \
            --web-browser-args '["--no-sandbox","--enable-unsafe-swiftshader","--lang=en-US","--accept-lang=en-US"]' \
            --verbose

      # Uploaded BEFORE the operations suite runs: patrol writes every run to the
      # same playwright-report directory, so the second run would overwrite this.
      - name: Upload Patrol report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: journey-playwright-report
          path: flutter/apps/wondermove_web/playwright-report
          if-no-files-found: ignore

      # ---------------------------------------------------------------------
      # Operations dashboard suite. Rides this same stack rather than getting its
      # own workflow: the two seeds cannot collide (seed_journey owns the
      # `journey_tenant` tenant and TN01MOCK*/TN02MARKET* vehicles; seed_operations
      # owns the `platform_management` master tenant and TNOPS01-15), so reusing
      # the bring-up saves a full backend/kratos/nginx build. compose.mock.yml
      # staying loaded is harmless here — the dashboard is read-only and never
      # touches OCR, SurePass or S3.
      #

      # Same stream-and-kill shape as the journey seed: seed_operations.dart
      # commits its work, prints the marker, then hangs (the Dart VM does not exit).
      # The step's verdict is the marker, not the exit code.
      - name: Seed operations fixtures
        run: |
          set +e
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "cd /app/functional-test && dart pub get && dart run tool/seed_operations.dart" \
            > /tmp/seed-operations.log 2>&1 &
          EXEC_PID=$!
          for i in $(seq 1 120); do
            grep -q "seed-operations] done" /tmp/seed-operations.log && break
            kill -0 "$EXEC_PID" 2>/dev/null || break
            sleep 2
          done
          cat /tmp/seed-operations.log
          kill "$EXEC_PID" 2>/dev/null
          docker compose $COMPOSE_FILES -p $PROJECT exec -T functional-test \
            sh -c "pkill -f seed_operations || true" >/dev/null 2>&1
          grep -q "seed-operations] done" /tmp/seed-operations.log

      # 15 trip variants x 14 summary columns, both KPI strips, the date-range
      # modes and the branchwise truck status. No sed/pub-get here: the journey
      # step above already rewrote web/index.html and resolved deps in this job.
      # --lang=en-US for the same reason as the journey step.
      - name: Patrol operations dashboard (UI)
        working-directory: flutter/apps/wondermove_web
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en_US:en
          LC_ALL: en_US.UTF-8
        run: |
          export CHROME_EXECUTABLE="$(find "$HOME/.cache/ms-playwright" -name chrome -path '*chrome-linux*' | head -1)"
          PATROL_ANALYTICS_ENABLED=false patrol test -d chrome \
            --target patrol_test/journey/operations_dashboard_test.dart \
            --web-port 3005 \
            --dart-define=ENV=local --dart-define=E2E=true \
            --web-headless true --web-server-timeout 600 \
            --web-browser-args '["--no-sandbox","--enable-unsafe-swiftshader","--lang=en-US","--accept-lang=en-US"]' \
            --verbose

      - name: Upload operations Patrol report
        uses: actions/upload-artifact@v4
        with:
          name: operations-playwright-report
          path: flutter/apps/wondermove_web/playwright-report
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose $COMPOSE_FILES -p $PROJECT logs --tail 300 \
            backend mock-server nginx kratos || true
