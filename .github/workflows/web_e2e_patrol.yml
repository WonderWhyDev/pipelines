# UAT smoke test — logs in as the seeded master admin through nginx, exactly
# like production's request path, to catch a broken login/boot before it ever
# reaches a real environment. Not a feature test: just "does the app come up
# and can someone get past the login screen." Mirrors the recipe proven
# locally; on ubuntu-latest (linux/amd64) the Rosetta problems that bite on
# Apple Silicon (adb crash, slow DDC compile) do not occur.
#
# Topology: the backend stack runs in docker (nginx published on :80); Patrol
# runs natively on the runner and serves the instrumented app on :3005. The app
# resolves its API from Uri.base.host (port 80) -> nginx -> backend/kratos, so
# /auth + /api flow through nginx.
#
# Requires two app changes that ship with this (already in the repo):
#   - auth_interceptor sends withCredentials so the Ory cookie reaches /api
#     cross-port; nginx-local returns credentialed CORS for /api.
#   - login_screen skips its post-login full-page reload under --dart-define=E2E
#     (a full navigation destroys Patrol's in-page test context).
#
# Base href: prod serves wondermove_web at /new/, but Patrol's web server serves
# at the app's base href and its readiness probe hits "/". We flip the base href
# to "/" for the throwaway CI build. FOLLOW-UP: restore the $FLUTTER_BASE_HREF
# placeholder in web/index.html and pass --base-href=/new/ in the prod build so
# this sed is unnecessary.

name: Web UAT Smoke Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "wonderWhy branch to test"
        required: false
        type: string
        default: main
  # schedule:
  #   - cron: "0 2 * * *"   # nightly, once stable

jobs:
  patrol-web:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      # The code + compose files live in the wonderWhy monorepo, not here, so
      # check THAT out (a bare checkout left compose.yml absent -> the bring-up
      # step failed with "compose.yml: no such file or directory").
      - uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          ref: ${{ inputs.branch || 'main' }}
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Activate Patrol CLI
        run: dart pub global activate patrol_cli

      # functional-test image is private on GHCR; the rest are public.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_SECRET_KEY }}

      - name: Bring up backend stack (nginx on :80)
        run: |
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy up -d --wait db localstack mailpit
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy exec -T localstack \
            awslocal sqs create-queue --queue-name margin
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy up -d kratos backend nginx functional-test

      # bin/ is gitignored in the monorepo (bin/wait-for-backend.sh + bin/seed.dart
      # are absent on CI, and the volume mount hides any baked-in copy). Inline the
      # poll and seed via the tracked tool/seed_journey.dart (a superset seed that
      # ensures the master tenant + admin and links the kratos identity).
      - name: Wait for backend
        run: |
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy exec -T functional-test sh -c '
            URL="http://backend:3000/api/transporter"
            echo "Waiting for backend at $URL ..."
            for i in $(seq 1 90); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
              case "$code" in 200|401) echo "Backend ready (HTTP $code)"; exit 0;; esac
              echo "Try $i: backend not ready (HTTP $code)"; sleep 5
            done
            echo "Backend did not become ready in time"; exit 1
          '

      # seed_journey.dart commits all its work, prints the completion marker, then
      # hangs (the Dart VM doesn't exit — a lingering client keeps the loop alive).
      # Stream it, proceed the instant the marker appears, then kill the leftover
      # process. No fixed idle wait; the step's verdict is the marker.
      - name: Seed master tenant
        run: |
          set +e
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy exec -T functional-test \
            sh -c "cd /app/functional-test && dart pub get && dart run tool/seed_journey.dart" \
            > /tmp/seed.log 2>&1 &
          EXEC_PID=$!
          for i in $(seq 1 120); do
            grep -q "master data ready" /tmp/seed.log && break
            kill -0 "$EXEC_PID" 2>/dev/null || break
            sleep 2
          done
          cat /tmp/seed.log
          kill "$EXEC_PID" 2>/dev/null
          docker compose -f compose.yml -f compose.local.yml -p wonderwhy exec -T functional-test \
            sh -c "pkill -f seed_journey || true" >/dev/null 2>&1
          grep -q "master data ready" /tmp/seed.log

      # Pin to the Playwright version patrol's web_runner bundles (patrol 4.6.1 ->
      # playwright 1.56.0) so patrol's own `npx playwright install` is a cached no-op.
      - name: Install Playwright Chromium (match patrol web_runner)
        run: npx --yes playwright@1.56.0 install --with-deps chromium

      # --lang=en-US: headless chromium otherwise exposes an empty/malformed
      # navigator.languages, and Flutter's engine init throws "Incorrect locale
      # information provided" (parseBrowserLanguages) before any test can run.
      - name: Run UAT smoke test
        working-directory: flutter/apps/wondermove_web
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en_US:en
          LC_ALL: en_US.UTF-8
        run: |
          sed -i 's#<base href="/new/">#<base href="/">#' web/index.html
          flutter pub get
          export CHROME_EXECUTABLE="$(find "$HOME/.cache/ms-playwright" -name chrome -path '*chrome-linux*' | head -1)"
          PATROL_ANALYTICS_ENABLED=false patrol test -d chrome \
            --target patrol_test/spike/login_smoke_test.dart \
            --web-port 3005 \
            --dart-define=ENV=local --dart-define=E2E=true \
            --web-headless true --web-server-timeout 600 \
            --web-browser-args '["--no-sandbox","--enable-unsafe-swiftshader","--lang=en-US","--accept-lang=en-US"]'

      - name: Upload Patrol report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: flutter/apps/wondermove_web/playwright-report
          if-no-files-found: ignore
