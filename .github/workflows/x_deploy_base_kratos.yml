name: X_Deploy_Base_Kratos
on:
  workflow_call:
    inputs:
      versionToBuild:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
        REPO_TOKEN:
            required: true
        EC2_IP:
            required: true
        AWS_ACCESS_KEY:
            required: true
        AWS_SECRET_KEY:
            required: true
        AWS_REGION:
            required: true
        EC2_USER:
            required: true
        SECURITY_GROUP_ID:
            required: true
        SSH_PRIVATE_KEY_FOR_EC2:
            required: true
        DOMAIN:
            required: true
        ANDROID_KEYSTORE_BASE64:
            required: true
        KEYSTORE_PASSWORD:
            required: true
        KEY_ALIAS:
            required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: check out repository for actions
        uses: actions/checkout@v5

      - name: Check out only kratos folder
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          sparse-checkout: 'kratos'
          sparse-checkout-cone-mode: false
          ref: ${{ inputs.versionToBuild }}

      - name: Decode Keystore
        run: |
          cd wonderWhy
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > kratos/keystore.jks

      - name: Generate Android passkey origin                                                                                                                 
        run: |
            RAW_SHA256=$(keytool -exportcert -alias "${{ secrets.KEY_ALIAS }}" \
              -keystore wonderWhy/kratos/keystore.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" | openssl sha256 -binary | base64)

            PASSKEY_HASH=$(echo -n "$RAW_SHA256" | tr '+/' '-_' | tr -d '=')

            if [ -z "$PASSKEY_HASH" ]; then
              echo "ERROR: Failed to generate PASSKEY_HASH. Verify your keystore credentials."
              exit 1
            fi
            
            ORIGIN="android:apk-key-hash:${PASSKEY_HASH}"  
            sed -i "s|ANDROID_PASSKEY_ORIGIN_PLACEHOLDER|android:apk-key-hash:${PASSKEY_HASH}|" wonderWhy/kratos/kratos.yml
            rm wonderWhy/kratos/keystore.jks

      - run: |
          cd wonderWhy
          ls -lsh
          zip -r kratos.zip kratos

      - uses: ./.github/actions/copy_to_ec2
        with:
           ec2IP: ${{ secrets.EC2_IP }}
           awsAccessKeyId: ${{ secrets.AWS_ACCESS_KEY }}
           awsSecretKey: ${{ secrets.AWS_SECRET_KEY }}
           awsRegion: ${{ secrets.AWS_REGION }}
           ec2User: ${{ secrets.EC2_USER }}
           securityGroupId: ${{ secrets.SECURITY_GROUP_ID }}
           sshKey: ${{ secrets.SSH_PRIVATE_KEY_FOR_EC2 }}
           fileToCopy: ./wonderWhy/kratos.zip
           destination: ~/kratos.zip
           unzipDestination: ~/
           runScript: |
             cd kratos
             chmod +x deploy.sh
             sh deploy.sh ${{ secrets.DOMAIN }}
