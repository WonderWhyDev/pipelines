name: X_Deploy_Base_Mobile_iOS
on:
  workflow_call:
    inputs:
      versionToBuild:
        required: true
        type: string
      environment:
        required: true
        type: string
      release_track:
        required: true
        type: string
    secrets:
      REPO_READ_TOKEN:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_KEY_P8:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: true

jobs:
  deploy:
    runs-on: macos-latest

    environment:
      name: ${{ inputs.environment }}

    env:
      APP_DIR: wonderWhy/flutter/apps/wondermove_mobile
      FLUTTER_ROOT_DIR: wonderWhy/flutter

    steps:
      - name: Check out wonderwhy folder
        uses: actions/checkout@v5
        with:
          repository: WonderWhyDev/wonderWhy
          token: ${{ secrets.REPO_READ_TOKEN }}
          path: wonderWhy
          fetch-depth: 1
          ref: ${{ inputs.versionToBuild }}

      - name: Select Xcode (iOS 26 SDK required by App Store)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -v "~> 1.15"
          pod --version

      - name: Bootstrap melos workspace
        run: |
          cd $FLUTTER_ROOT_DIR
          dart pub get
          dart run melos bootstrap

      - name: Inject Fastlane
        run: |
          cd wonderWhy
          mkdir -p flutter/apps/wondermove_mobile/ios/fastlane
          cp -r automation/iosFastlane/* flutter/apps/wondermove_mobile/ios/fastlane/
          cp -r automation/Gemfile flutter/apps/wondermove_mobile/ios/

      - name: Precache Flutter iOS engine
        run: |
          cd $APP_DIR
          flutter precache --ios --no-android --no-web --no-linux --no-windows --no-macos --no-fuchsia

      - name: Install iOS dependencies
        run: |
          cd $APP_DIR
          flutter pub get
          cd ios
          gem install bundler -v "~> 2.7"
          bundle install
          pod install

      - name: Build & Upload
        timeout-minutes: 45
        env:
          CI: "true"
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FASTLANE_VERBOSE: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_HIDE_CHANGELOG: "1"
          VERBOSE_SCRIPT_LOGGING: "true"
          GYM_VERBOSE: "true"
        run: |
          cd $APP_DIR/ios
          echo "Running iOS lane: ${{ inputs.release_track }}"
          bundle exec fastlane --version
          case "${{ inputs.release_track }}" in
            beta)
              bundle exec fastlane beta
              ;;
            promote_beta_to_production)
              bundle exec fastlane promote_beta_to_production
              ;;
            *)
              echo "Unknown release_track: ${{ inputs.release_track }}"
              exit 1
              ;;
          esac
